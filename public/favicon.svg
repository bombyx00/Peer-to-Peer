<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- 배경 그라데이션 (둥근 사각형) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- 깃털 그라데이션 (네온 바이올렛에서 인디고로) -->
    <linearGradient id="featherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>

    <!-- 깃대 및 펜촉 그라데이션 (골드 느낌) -->
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>

  <!-- 부드러운 스쿼클(둥근 사각형) 배경 -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- 깃털 펜 디자인 -->
  <g transform="translate(40, 40) scale(0.85)">
    <!-- 깃털 몸체 -->
    <path d="M 380 60 
             C 330 40, 240 70, 180 150 
             C 140 200, 120 270, 120 340 
             C 120 360, 130 370, 145 365 
             C 170 355, 230 310, 260 260 
             C 230 280, 180 310, 155 315 
             C 150 316, 148 310, 153 305 
             C 185 270, 255 210, 295 170 
             C 265 190, 215 220, 190 230 
             C 185 232, 182 225, 187 220 
             C 225 180, 290 120, 335 90 
             C 305 105, 260 125, 235 135 
             C 230 137, 227 130, 232 125 
             C 275 85, 335 55, 380 60 Z" 
          fill="url(#featherGrad)" />

    <!-- 깃대 (Shaft/Stem) -->
    <path d="M 380 60 
             Q 260 160, 140 360 
             L 100 420" 
          stroke="url(#stemGrad)" 
          stroke-width="14" 
          stroke-linecap="round" 
          fill="none" />

    <!-- 금빛 펜촉 (Nib) -->
    <path d="M 100 420 
             L 70 440 
             L 60 450 
             L 75 435 
             L 95 405 
             Z" 
          fill="url(#stemGrad)" />
          
    <!-- 펜촉 슬릿 (Nib split line) -->
    <line x1="82" y1="428" x2="60" y2="450" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round" />

    <!-- 잉크 방울 효과 -->
    <path d="M 50 465 
             C 45 460, 35 465, 35 472 
             C 35 480, 42 485, 50 485 
             C 58 485, 65 480, 65 472 
             C 65 465, 55 460, 50 465 Z" 
          fill="url(#featherGrad)" />
  </g>
</svg>